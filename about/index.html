<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About - My Static Site</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f4f8;
      }
      .container {
        text-align: center;
        padding: 2rem;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        max-width: 480px;
      }
      h1 { color: #232f3e; }
      p { color: #555; }
      a { color: #ff9900; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>About This Site</h1>
      <p>
        This is a static website hosted on Amazon S3, served globally via
        CloudFront CDN, and enhanced with Lambda@Edge for dynamic edge logic.
      </p>
      <p>
        Deployments are fully automated through a CI/CD pipeline, pushing
        changes live on every commit.
      </p>
      <p><a href="/">Back to Home</a></p>
    </div>
  </body>
</html>
