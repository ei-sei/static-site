<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Static Site</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f4f8;
      }
      .container {
        text-align: center;
        padding: 2rem;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 { color: #232f3e; }
      p { color: #555; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hello from S3!</h1>
      <p>Static website hosted on Amazon S3 with CloudFront CDN. <br><br> CI/CD pipeline has now been enabled! </p>
    </div>
  </body>
</html>
